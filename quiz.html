<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizMaster — Active Quiz</title>
  <link rel="stylesheet" href="css/style.css?v=1.1" />
</head>
<body>
  <!-- Quiz Header Bar with metadata and timer -->
  <header class="quiz-header">
    <div class="container flex justify-between align-center" style="align-items: center;">
      <div class="quiz-info">
        <span class="navbar-title" style="font-size: 16px; margin-right: 8px;">🎯 QuizMaster</span>
        <span class="badge badge-purple" id="quiz-subject">Subject</span>
        <span class="badge badge-blue" id="quiz-level">Level</span>
      </div>
      <div class="timer-display" id="timer-display" aria-live="polite">
        <span>⏱</span>
        <span id="timer-text">--:--</span>
      </div>
    </div>
  </header>

  <!-- Progress Bar indicator -->
  <div class="progress-bar" style="border-radius: 0; height: 4px;">
    <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
  </div>

  <main class="container-md py-6">
    <!-- Quick Question Dots Navigation -->
    <div class="question-dots" id="question-dots">
      <!-- Populated by quiz.js -->
    </div>

    <!-- Active Question Card -->
    <div class="question-card mt-4" id="active-question-card">
      <div class="question-number" id="question-number">Question -- of --</div>
      <h2 class="question-text" id="question-text">Loading question content...</h2>
      
      <!-- Option Buttons Grid -->
      <div class="options-grid" id="options-container">
        <!-- Populated by quiz.js -->
      </div>
    </div>

    <!-- Navigation Buttons -->
    <div class="quiz-nav">
      <button class="btn btn-secondary" id="btn-prev" onclick="prevQuestion()" disabled>
        ← Previous
      </button>
      <div style="display: flex; gap: 10px;">
        <button class="btn btn-ghost" id="btn-abort" onclick="abortQuiz()">
          Abort Quiz
        </button>
        <button class="btn btn-success" id="btn-submit-now" onclick="confirmSubmit()" style="background: linear-gradient(135deg, #10b981, #059669); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer;">
          ✓ Submit Quiz
        </button>
      </div>
      <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()">
        Next →
      </button>
    </div>
  </main>

  <!-- Custom Submit Confirmation Modal -->
  <div id="submit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#1a1a2e; border:1px solid rgba(255,255,255,0.15); border-radius:20px; padding:40px 36px; max-width:420px; width:90%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.5);">
      <div style="font-size:48px; margin-bottom:16px;">📋</div>
      <h2 style="color:#f1f5f9; font-size:22px; font-weight:800; margin-bottom:10px;">Submit Quiz?</h2>
      <p id="submit-modal-msg" style="color:#94a3b8; font-size:15px; line-height:1.6; margin-bottom:30px;"></p>
      <div style="display:flex; gap:12px; justify-content:center;">
        <button onclick="closeSubmitModal()" style="padding:12px 28px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:transparent; color:#f1f5f9; font-size:14px; font-weight:600; cursor:pointer;">Cancel</button>
        <button onclick="confirmAndSubmit()" style="padding:12px 28px; border-radius:10px; border:none; background:linear-gradient(135deg,#10b981,#059669); color:#fff; font-size:14px; font-weight:700; cursor:pointer;">Yes, Submit!</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js?v=1.1"></script>
  <script src="js/questions.js?v=1.1"></script>
  <script src="js/quiz.js?v=1.1"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initQuiz);

    function abortQuiz() {
      if (window.confirm("⚠️ Are you sure you want to abort the quiz? Your progress will be lost and no score will be recorded.")) {
        document.removeEventListener('visibilitychange', handleVisibilityChange);
        window.location.href = 'dashboard.html';
      }
    }

    function openSubmitModal(msg) {
      document.getElementById('submit-modal-msg').textContent = msg;
      const modal = document.getElementById('submit-modal');
      modal.style.display = 'flex';
    }

    function closeSubmitModal() {
      document.getElementById('submit-modal').style.display = 'none';
    }

    function confirmAndSubmit() {
      closeSubmitModal();
      submitQuiz();
    }
  </script>
</body>
</html>
